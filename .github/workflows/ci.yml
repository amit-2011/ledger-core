name: CI

on:
  push:
    branches: [main, uat, development]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ledger
          POSTGRES_PASSWORD: ledger
          POSTGRES_DB: ledger_core
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ledger -d ledger_core"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: ledger
      DB_PASSWORD: ledger
      DB_NAME: ledger_core

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      - name: Run migrations
        run: pnpm migration:run

      - name: End-to-end tests
        run: pnpm test:e2e
