services:
  db:
    image: postgres:16-alpine
    container_name: ledger-core-db
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger_core
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ledger -d ledger_core']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
